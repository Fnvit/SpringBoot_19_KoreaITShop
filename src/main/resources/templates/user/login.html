<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>로그인</title>
</head>
<body>
    <h1>로그인 페이지</h1>
    <b style="color: orange" th:text="${oauth2ErrorMessage}"></b>
    <fieldset>
        <legend>로그인</legend>
        <form action="/user/login" method="post">
            <div>
                <label>
                    <b>아이디</b>
                    <input type="text" name="id">
                </label>
            </div>
            <div>
                <label>
                    <b>비밀번호</b>
                    <input type="text" name="password">
                </label>
            </div>
            <div>
                <label>
                    <span>아이디 기억</span>
                    <input type="checkbox">
                </label>
                <label>
                    <span>자동로그인</span>
                    <input type="checkbox" name="remember_me">
                </label>
            </div>
            <div>
                <button>로그인</button>
            </div>
        </form>

        <section>
            <a href="/oauth2/authorization/naver">
                <img src="../../static/image/naver_login_light.png" width="200" alt="네이버로그인버튼"/>
            </a>
            <a href="/oauth2/authorization/google">
                <img src="../../static/image/google_login_light.png" width="200" alt="구글로그인버튼"/>
            </a>
        </section>




    </fieldset>
</body>
</html>
